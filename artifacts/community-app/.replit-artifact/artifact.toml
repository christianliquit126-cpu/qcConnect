kind = "web"
previewPath = "/"
title = "QC Community Help & Support"
version = "1.0.0"
id = "artifacts/community-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25876

[services.development]
run = "pnpm --filter @workspace/community-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/community-app", "run", "build" ]
publicDir = "artifacts/community-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25876"
BASE_PATH = "/"
